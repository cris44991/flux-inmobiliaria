<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flux Inmobiliaria | Iniciar Sesión</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-page">
    <header class="login-header">
      <a href="../index.html" class="brand-login" aria-label="Volver al inicio">Flux Inmobiliaria</a>
    </header>
    <main class="login-main" aria-labelledby="login-title">
      <section class="login-box" role="form" aria-label="Formulario de inicio de sesión">
        <h1 id="login-title">Iniciar Sesión</h1>
        <p>Accede a tu cuenta para gestionar tus propiedades y clientes.</p>
        <form action="#" method="post" novalidate>
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" placeholder="nombre@ejemplo.cl" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" placeholder="********" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
          <p class="forgot-text">
            <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
          </p>
        </form>
      </section>
    </main>
    <footer class="login-footer">
      <p>¿Aún no tienes cuenta? <a href="../RegistroPropietario/propietario.html">Regístrate aquí</a></p>
      <p>© 2026 Flux Inmobiliaria</p>
    </footer>
  </div>
</body>
</html>
