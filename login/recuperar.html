<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flux Inmobiliaria | Recuperar contraseña</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="login-page recuperar">
    <header class="login-header">
      <a href="index.html" class="brand-login" aria-label="Volver al inicio">Flux Inmobiliaria</a>
    </header>

    <main class="login-main" aria-labelledby="recuperar-title">
      <section class="login-box" aria-label="Formulario de recuperación de contraseña">
        <h1 id="recuperar-title">Recuperar contraseña</h1>
        <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>

        <form action="#" method="post" novalidate>
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" placeholder="nombre@ejemplo.cl" required autocomplete="email" />
          </div>

          <button type="submit" class="btn btn-primary btn-full">Enviar</button>
        </form>

        <p class="forgot-text">
          <a href="login.html">Volver al inicio de sesión</a>
        </p>
      </section>
    </main>

    <footer class="login-footer">
      <p>© 2026 Flux Inmobiliaria</p>
    </footer>
  </div>
</body>
</html>
