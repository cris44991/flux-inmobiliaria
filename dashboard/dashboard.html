<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard — Flux Inmobiliaria</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body class="dashboard-page">
    <div class="dashboard-shell">
      <aside class="dashboard-sidebar" id="sidebar" aria-label="Menú lateral">
        <div class="sidebar-brand">
          <a href="../index.html" class="brand"><span class="brand-logo">Flux</span> Inmobiliaria</a>
        </div>
        <nav class="sidebar-nav" role="navigation" aria-label="Dashboard">
          <a href="#usuarios" class="active">Usuarios</a>
          <a href="#propiedades">Propiedades</a>
          <a href="#publicaciones">Publicaciones</a>
          <a href="#estadisticas">Estadísticas</a>
          <a href="#configuracion">Configuración</a>
        </nav>
      </aside>

      <div class="dashboard-main">
        <header class="dashboard-topbar">
          <button id="sidebarToggle" class="btn">☰</button>
          <div class="top-actions">
            <span>👤 <span id="userName">Usuario</span></span>
            <span style="font-size: 0.85rem; color: var(--muted);">(<span id="userRole">Admin</span>)</span>
            <button id="logoutBtn" class="btn btn-secondary" style="margin-left: 1rem;">Cerrar sesión</button>
          </div>
        </header>

        <main class="dashboard-content container">
          <section id="usuarios" aria-label="Usuarios">
            <h2>Usuarios</h2>
            <p class="muted">Gestiona usuarios registrados</p>

            <div class="card">
              <div class="card-body">
                <div class="flex" style="justify-content:space-between;align-items:center">
                  <h3>Lista de usuarios</h3>
                  <div style="display:flex;gap:.6rem;align-items:center">
                    <input id="userSearch" placeholder="Buscar usuarios..." aria-label="Buscar usuarios" style="padding:.45rem .6rem;border-radius:8px;border:1px solid rgba(15,23,42,0.06)" />
                    <button id="newUserBtn" class="btn btn-primary">Nuevo usuario</button>
                  </div>
                </div>
                <div style="margin-top:1rem;overflow:auto">
                  <table class="table-users" style="width:100%;border-collapse:collapse">
                    <thead>
                      <tr>
                        <th>RUT</th><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Acciones</th>
                      </tr>
                    </thead>
                    <tbody id="usersTableBody">
                      <!-- filas generadas por JS -->
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </section>

          <div id="userModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="userModalTitle">
            <div class="modal-dialog">
              <header class="modal-header">
                <h3 id="userModalTitle">Nuevo usuario</h3>
                <button class="btn" id="closeModal">✕</button>
              </header>
              <div class="modal-body">
                <form id="userForm">
                  <div class="form-grid">
                    <div class="form-group"><label for="u_rut">RUT</label><input id="u_rut" name="u_rut" required /></div>
                    <div class="form-group"><label for="u_name">Nombre</label><input id="u_name" name="u_name" required /></div>
                    <div class="form-group"><label for="u_email">Email</label><input id="u_email" name="u_email" type="email" required /></div>
                    <div class="form-group"><label for="u_phone">Teléfono</label><input id="u_phone" name="u_phone" required /></div>
                  </div>
                  <div style="margin-top:1rem;display:flex;gap:.6rem;justify-content:flex-end">
                    <button type="button" class="btn" id="cancelUser">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <section id="propiedades" aria-label="Propiedades" style="margin-top:1.6rem">
            <h2>Propiedades</h2>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <p class="muted">Gestiona las propiedades publicadas</p>
              <div>
                <button id="newPropertyBtn" class="btn btn-primary">Nueva propiedad</button>
              </div>
            </div>

            <div class="cards-grid" id="dashboardProperties">
              <!-- tarjetas JS -->
            </div>
          </section>

          <div id="propertyModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="propertyModalTitle">
            <div class="modal-dialog">
              <header class="modal-header">
                <h3 id="propertyModalTitle">Nueva propiedad</h3>
                <button class="btn" id="closePropertyModal">✕</button>
              </header>
              <div class="modal-body">
                <form id="propertyForm">
                  <div class="form-grid">
                    <div class="form-group"><label for="p_title">Título</label><input id="p_title" name="p_title" required /></div>
                    <div class="form-group"><label for="p_tipo">Tipo</label><select id="p_tipo" name="p_tipo"><option value="Casa">Casa</option><option value="Departamento">Departamento</option><option value="Terreno">Terreno</option></select></div>
                    <div class="form-group"><label for="p_price">Precio (UF)</label><input id="p_price" name="p_price" required /></div>
                    <div class="form-group"><label for="p_uf">Precio (CLP)</label><input id="p_uf" name="p_uf" /></div>
                    <div class="form-group"><label for="p_bed">Dormitorios</label><input id="p_bed" name="p_bed" type="number" min="0" /></div>
                    <div class="form-group"><label for="p_bath">Baños</label><input id="p_bath" name="p_bath" type="number" min="0" /></div>
                    <div class="form-group"><label for="p_area">Área (m²)</label><input id="p_area" name="p_area" /></div>
                    <div class="form-group"><label for="p_location">Ubicación</label><input id="p_location" name="p_location" placeholder="Comuna, Ciudad" /></div>
                    <div class="form-group"><label for="p_features">Características</label>
                      <div style="display:flex;flex-wrap:wrap;gap:.4rem">
                        <label><input type="checkbox" name="p_features" value="Piscina" /> Piscina</label>
                        <label><input type="checkbox" name="p_features" value="Patio" /> Patio</label>
                        <label><input type="checkbox" name="p_features" value="Estacionamiento" /> Estacionamiento</label>
                        <label><input type="checkbox" name="p_features" value="Bodega" /> Bodega</label>
                        <label><input type="checkbox" name="p_features" value="Logia" /> Logia</label>
                      </div>
                    </div>
                    <div class="form-group"><label for="p_images">Fotografías (select archivos)</label><input id="p_images" name="p_images" type="file" accept="image/*" multiple /></div>
                    <div class="form-group" style="grid-column:1/-1"><label for="p_desc">Descripción</label><textarea id="p_desc" name="p_desc" rows="4"></textarea></div>
                  </div>
                  <div style="margin-top:1rem;display:flex;gap:.6rem;justify-content:flex-end">
                    <button type="button" class="btn" id="cancelProperty">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar propiedad</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/dashboard.js" defer></script>
    <script src="../js/dashboard-auth.js" defer></script>
  </body>
</html>
</body>
</html>
